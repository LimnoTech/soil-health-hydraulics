[workspace]
authors = ["Anthony Aufdenkampe <aaufdenkampe@limno.com>"]
channels = ["conda-forge"]
name = "soil-health-hydraulics"
platforms = ["osx-arm64", "win-64", "linux-64"]
version = "0.1.0"

[tasks]
# Render the Quarto website into _site/. Executes notebooks as needed and refreshes the
# _freeze/ cache (commit it); CI then renders from that cache without re-executing.
render = "quarto render"
preview = "quarto preview"

[dependencies]
python = ">=3.14.5,<3.15"
pandas = ">=3.0.3,<4"
numpy = ">=2.4.6,<3"
scipy = ">=1.14.1,<2"
jupyterlab = ">=4.5.8,<5"
ipykernel = ">=7.2.0,<8"
matplotlib = ">=3.10.9,<4"
hvplot = ">=0.12.2,<0.13"
holoviews = ">=1.22.1,<2"
jupytext = ">=1.19.3,<2"
jupyter_bokeh = ">=4.0.5,<5"
panel = ">=1.9.3,<2"
quarto = ">=1.5,<2"

[pypi-dependencies]
rosetta-soil = ">=0.3.2, <0.4"

name: Publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: default
          # Cache the solved env keyed on pixi.lock for fast rebuilds
          cache: true

      - name: Render site (Quarto)
        # Renders from the committed _freeze/ cache: Quarto does NOT re-execute the
        # notebooks (so no kernel/UNSODA/mdbtools needed here), and the interactive
        # HoloViews/Bokeh embeds are preserved. Regenerate _freeze locally with
        # `pixi run render` after editing a notebook.
        run: pixi run render

      - name: Fail if _freeze/ is stale
        # A freeze cache that matches the notebooks is a render-only no-op for _freeze/.
        # If rendering changed _freeze/, Quarto had to re-execute -> the committed cache
        # was out of date. Re-run `pixi run render` locally and commit _freeze/.
        run: |
          if [ -n "$(git status --porcelain -- _freeze/)" ]; then
            echo "::error::_freeze/ is out of date for the current notebooks. Run 'pixi run render' locally and commit _freeze/."
            git status --porcelain -- _freeze/
            git --no-pager diff --stat -- _freeze/
            exit 1
          fi
          echo "_freeze/ is up to date."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
